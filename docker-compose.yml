services:
  mysql:
    image: mysql:8.0
    container_name: chronos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chronos
      MYSQL_USER: chronos
      MYSQL_PASSWORD: chronos
    ports:
      - "3307:3306"
    volumes:
      - chronos_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: chronos-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: chronos
      PMA_PASSWORD: chronos
    ports:
      - "8083:80"

volumes:
  chronos_mysql_data:
