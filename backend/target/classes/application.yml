spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/chronos}
    username: ${SPRING_DATASOURCE_USERNAME:chronos}
    password: ${SPRING_DATASOURCE_PASSWORD:chronos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/chronos}}
    user: ${SPRING_FLYWAY_USER:${SPRING_DATASOURCE_USERNAME:chronos}}
    password: ${SPRING_FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD:chronos}}
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}

chronos:
  jwt:
    secret: ${CHRONOS_JWT_SECRET:chronos-super-secret-key-chronos-super-secret-key}
    expiration-minutes: ${CHRONOS_JWT_EXPIRATION_MINUTES:1440}
  integrations:
    encryption-key: ${CHRONOS_INTEGRATIONS_ENCRYPTION_KEY:chronos-integration-key-chronos-integration-key}
    frontend-base-url: ${CHRONOS_FRONTEND_BASE_URL:http://localhost:3000}
    spotify:
      enabled: ${SPOTIFY_ENABLED:false}
      client-id: ${SPOTIFY_CLIENT_ID:}
      client-secret: ${SPOTIFY_CLIENT_SECRET:}
      redirect-uri: ${SPOTIFY_REDIRECT_URI:http://localhost:8082/api/v1/integrations/spotify/callback}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId:-n/a}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.chronos.api: INFO
    org.springframework.boot: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
