spring:
  datasource:
    url: jdbc:h2:mem:chronos;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

chronos:
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key
    expiration-minutes: 60
  integrations:
    encryption-key: test-integration-key-test-integration-key
    frontend-base-url: http://localhost:3000
    spotify:
      enabled: false
      client-id: ""
      client-secret: ""
      redirect-uri: http://localhost:8082/api/v1/integrations/spotify/callback

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId:-n/a}] %logger{36} - %msg%n"
  level:
    root: WARN
    com.chronos.api: INFO
    org.springframework.boot: INFO
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.test: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
